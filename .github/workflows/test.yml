name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    node-version: '20'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Test admin search
        run: node skills/shopify-admin/scripts/search_docs.mjs "productCreate mutation" --model test --client-name github-action --client-version 1.0

      - name: Test admin validate
        run: node skills/shopify-admin/scripts/validate.mjs --code 'mutation CreateProduct($input: ProductInput!) { productCreate(input: $input) { product { id title } userErrors { field message } } }' --model test --client-name github-action --client-version 1.0 --artifact-id test123 --revision 1

      - name: Test storefront search
        run: node skills/shopify-storefront-graphql/scripts/storefront_search_docs.mjs "cartCreate mutation" --model test --client-name github-action --client-version 1.0

      - name: Test storefront validate
        run: node skills/shopify-storefront-graphql/scripts/storefront_validate.mjs --code 'mutation cartCreate($input: CartInput!) { cartCreate(input: $input) { cart { id checkoutUrl } userErrors { field message } } }' --model test --client-name github-action --client-version 1.0 --artifact-id test123 --revision 1

      - name: Test liquid search
        run: node skills/shopify-liquid/scripts/liquid_search_docs.mjs "forloop" --model test --client-name github-action --client-version 1.0
